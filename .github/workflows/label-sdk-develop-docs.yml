name: Label SDK develop-docs PRs

on:
  pull_request_target:
    types: [opened]
    paths: ['develop-docs/sdk/**']

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf # v1
        with:
          labels: sdk-develop-docs
