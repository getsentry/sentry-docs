name: 'Triage Issue (Flue)'

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage'
        required: true
        type: number

concurrency:
  group: triage-issue-${{ github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Flue
        run: npm install -g @flue/cli

      - name: Parse issue number
        id: issue
        env:
          INPUT_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
        run: echo "number=$INPUT_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Run triage agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          npx flue run triage-issue --target node \
            --id "triage-${ISSUE_NUMBER}" \
            --payload "{\"issueNumber\": ${ISSUE_NUMBER}}"

      - name: Apply labels
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "TODO: Parse agent output and apply labels via gh cli"
          echo "This step will be implemented after validating agent output"
