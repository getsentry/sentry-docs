name: 'Triage Issue (Flue)'

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage'
        required: true
        type: number

concurrency:
  group: triage-issue-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.issue.author_association == 'MEMBER' ||
      github.event.issue.author_association == 'COLLABORATOR' ||
      github.event.issue.author_association == 'OWNER'
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Flue
        run: npm install -g @flue/cli

      - name: Parse issue number
        id: issue
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          INPUT_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
        run: |
          if [ "$EVENT_NAME" = "issues" ]; then
            echo "number=$EVENT_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "number=$INPUT_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Run triage agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          npx flue run triage-issue --target node \
            --id "triage-${ISSUE_NUMBER}" \
            --payload "{\"issueNumber\": ${ISSUE_NUMBER}}"
