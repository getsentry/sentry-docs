default_language_version:
  node: "22"
exclude: '\.snap|node_modules$'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v1.4.0
    hooks:
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-xml
      - id: check-yaml
      - id: detect-private-key
        exclude: |
          (?x)^(
              develop-docs/backend/config.mdx|
              develop-docs/integrations/github.mdx|
              develop-docs/self-hosted/sso.mdx
          )$
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: debug-statements
      - id: flake8
      - id: fix-encoding-pragma
        args: ['--remove']
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        description: This hook runs Prettier on JavaScript and TypeScript files
        entry: prettier
        language: node
        files: '\.[jt]sx?$'
        exclude: 'node_modules'
        types: [text]
        args: ['--write']
      - id: eslint
        name: eslint
        description: This hook runs eslint on JavaScript and TypeScript files
        entry: eslint
        language: node
        files: '\.[jt]sx?$'
        exclude: 'node_modules'
        types: [text]
  - repo: https://github.com/crate-ci/typos
    rev: v1.39.0
    hooks:
      - id: typos
  - repo: local
    hooks:
      - id: lychee
        name: Check external links (warn only)
        entry: node scripts/lint-external-links.mjs
        language: system
        files: \.(md|mdx)$
        verbose: true
